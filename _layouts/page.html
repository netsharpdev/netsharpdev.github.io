---
layout: default
---
<article>
    <header class="post-header">
        <div class="container">
            <h1 class="post-header__title">{{ page.title }}</h1>
            {% if page.description %}
            <p class="post-header__meta" style="display:block; text-align:center;">{{ page.description }}</p>
            {% endif %}
        </div>
    </header>

    <div class="post-content">
        {{ content }}
    </div>
</article>
